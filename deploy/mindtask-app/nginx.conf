server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reasonable defaults
  sendfile on;
  tcp_nopush on;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Long cache for hashed static assets — Vite emits hashed filenames
  location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpe?g|gif|webp|avif|svg|ico)$ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: any unmatched path serves index.html so client-side routing works
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }

  # Belt-and-suspenders: if /api ever lands here (Traefik routing misconfigured),
  # return 502 with a clear hint instead of falling through to index.html.
  location /api {
    return 502 "Routing misconfiguration: /api requests must be sent to the api-server, not the web container.\n";
    default_type text/plain;
  }
}
