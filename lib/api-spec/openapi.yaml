openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MindTask API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: workspaces
    description: Workspace management
  - name: maps
    description: Mind map management
  - name: cards
    description: Card management
  - name: tasks
    description: Task management
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: shapes
    description: Drawable shapes on a mind map (rectangles, ellipses, lines)
  - name: text-elements
    description: Free-form text elements on a mind map

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces:
    get:
      operationId: listWorkspaces
      tags: [workspaces]
      summary: List workspaces for current user
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceResponse"
    post:
      operationId: createWorkspace
      tags: [workspaces]
      summary: Create a workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"

  /workspaces/{workspaceId}:
    get:
      operationId: getWorkspace
      tags: [workspaces]
      summary: Get workspace by ID
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateWorkspace
      tags: [workspaces]
      summary: Update workspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "200":
          description: Updated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceResponse"
    delete:
      operationId: deleteWorkspace
      tags: [workspaces]
      summary: Delete workspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /workspaces/{workspaceId}/members:
    get:
      operationId: listWorkspaceMembers
      tags: [workspaces]
      summary: List workspace members
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMemberResponse"
    post:
      operationId: addWorkspaceMember
      tags: [workspaces]
      summary: Add member to workspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberResponse"

  /workspaces/{workspaceId}/members/{memberId}:
    patch:
      operationId: patchWorkspaceMemberRole
      tags: [workspaces]
      summary: Update member role
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRoleRequest"
      responses:
        "200":
          description: Member role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberResponse"
        "403":
          description: Forbidden (e.g. admin cannot change own role)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Member not found in workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateWorkspaceMember
      tags: [workspaces]
      summary: Update member role (legacy)
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRoleRequest"
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMemberResponse"
    delete:
      operationId: removeWorkspaceMember
      tags: [workspaces]
      summary: Remove member from workspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: memberId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /workspaces/{workspaceId}/maps:
    get:
      operationId: listMaps
      tags: [maps]
      summary: List maps in workspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of maps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MapResponse"
    post:
      operationId: createMap
      tags: [maps]
      summary: Create a map
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMapRequest"
      responses:
        "201":
          description: Map created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapResponse"

  /workspaces/{workspaceId}/maps/{mapId}:
    get:
      operationId: getMap
      tags: [maps]
      summary: Get map with cards and connections
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mapId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Map with cards and connections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapDetailResponse"
    put:
      operationId: updateMap
      tags: [maps]
      summary: Update map name
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mapId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMapRequest"
      responses:
        "200":
          description: Updated map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapResponse"
    delete:
      operationId: deleteMap
      tags: [maps]
      summary: Delete map
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mapId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /workspaces/{workspaceId}/maps/{mapId}/layout:
    post:
      operationId: layoutMap
      tags: [maps]
      summary: Auto-arrange map cards (dagre, minimizes edge crossings)
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mapId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Cards repositioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LayoutMapResponse"

  /workspaces/{workspaceId}/maps/{mapId}/cards:
    post:
      operationId: createCard
      tags: [cards]
      summary: Create a card in the map
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mapId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCardRequest"
      responses:
        "201":
          description: Card created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardResponse"

  /workspaces/{workspaceId}/maps/{mapId}/cards/{cardId}:
    get:
      operationId: getCard
      tags: [cards]
      summary: Get a card with its task
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mapId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Card with optional task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardDetailResponse"
    put:
      operationId: updateCard
      tags: [cards]
      summary: Update a card (title, description, position)
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mapId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCardRequest"
      responses:
        "200":
          description: Updated card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardResponse"
    delete:
      operationId: deleteCard
      tags: [cards]
      summary: Delete a card
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mapId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /workspaces/{workspaceId}/maps/{mapId}/connections:
    post:
      operationId: createConnection
      tags: [cards]
      summary: Create a connection between cards
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mapId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConnectionRequest"
      responses:
        "201":
          description: Connection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionResponse"

  /workspaces/{workspaceId}/maps/{mapId}/connections/{connectionId}:
    delete:
      operationId: deleteConnection
      tags: [cards]
      summary: Delete a connection
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mapId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /workspaces/{workspaceId}/maps/{mapId}/cards/{cardId}/task:
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task linked to a card
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mapId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created and card updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "409":
          description: Card already has a task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unlinkTask
      tags: [tasks]
      summary: Unlink and delete task from a card
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mapId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task unlinked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /workspaces/{workspaceId}/maps/{mapId}/cards/{cardId}/task/status:
    patch:
      operationId: updateTaskStatus
      tags: [tasks]
      summary: Update task status (syncs card visual status)
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mapId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskStatusRequest"
      responses:
        "200":
          description: Task and card updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

  /workspaces/{workspaceId}/maps/{mapId}/cards/{cardId}/task/details:
    patch:
      operationId: updateTaskDetails
      tags: [tasks]
      summary: Update task details (title, description, assignee, due date, priority)
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: mapId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskDetailsRequest"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"

  /my-tasks:
    get:
      operationId: getMyTasks
      tags: [tasks]
      summary: Get tasks assigned to the current user
      parameters:
        - name: workspaceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/TaskStatus"
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskWithContextResponse"

  /workspaces/{workspaceId}/dashboard:
    get:
      operationId: getDashboard
      tags: [workspaces]
      summary: Get dashboard summary for a workspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"

  /workspaces/{workspaceId}/tasks/{taskId}/attachments:
    get:
      operationId: listTaskAttachments
      tags: [tasks]
      summary: List attachments for a task
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttachmentResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createTaskAttachment
      tags: [tasks]
      summary: Create an attachment for a task
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttachmentRequest"
      responses:
        "201":
          description: Attachment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{workspaceId}/tasks/{taskId}/attachments/{attachmentId}:
    patch:
      operationId: updateTaskAttachmentKind
      tags: [tasks]
      summary: Update an attachment's kind (standard or deliverable)
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAttachmentKindRequest"
      responses:
        "200":
          description: Updated attachment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task or attachment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTaskAttachment
      tags: [tasks]
      summary: Delete an attachment from a task
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Attachment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Task or attachment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{workspaceId}/tasks/{taskId}/attachments/{attachmentId}/kind:
    patch:
      operationId: setTaskAttachmentKind
      tags: [tasks]
      summary: Promote or demote an attachment per-link (with propagation)
      description: |
        Works for both native and inherited attachments on the task. Changes
        the `task_attachments` row's `kind`. Promotion (`deliverable`)
        propagates the attachment to every downstream task linked from this
        one as `standard`. Demotion (`standard`) runs the cascade that
        clears standard rows inherited from this task. Use this instead of
        the legacy PATCH `/attachments/{attachmentId}` when you need the
        inheritance behaviour — the legacy endpoint only edits the file's
        primary row.
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: taskId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: attachmentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAttachmentKindRequest"
      responses:
        "200":
          description: Kind updated; counts describe the cascade
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromoteOrDemoteResponse"
        "404":
          description: Attachment not linked to task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{workspaceId}/tasks/{taskId}/attachments/{attachmentId}/link:
    delete:
      operationId: unlinkAttachmentFromTask
      tags: [tasks]
      summary: Remove the attachment from this task without deleting the file
      description: |
        Unlinks an attachment from a task (removes the join row). The file
        remains in storage and continues to exist on any other tasks linked
        to it. If the attachment was a deliverable on this task, the cascade
        runs and downstream targets that inherited from this task lose it.
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: taskId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: attachmentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Unlinked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnlinkAttachmentResponse"
        "404":
          description: Attachment not linked to task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{workspaceId}/tasks/{taskId}/attachments/{attachmentId}/usage:
    get:
      operationId: getTaskAttachmentUsage
      tags: [tasks]
      summary: How many tasks this attachment is linked to
      description: |
        Used by the delete-confirmation modal to warn "this file is on N tasks
        and will be removed from all of them" before issuing the hard delete.
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: taskId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: attachmentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Usage info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentUsageResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{workspaceId}/tasks/{approvalTaskId}/consolidated-activities:
    get:
      operationId: getConsolidatedActivities
      tags: [tasks]
      summary: Consolidated activity history for an approval task (parent + sibling approvers)
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: approvalTaskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Activities from parent task and all approval siblings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConsolidatedActivityResponse"
        "400":
          description: Task is not an approval task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{workspaceId}/maps/{mapId}/shapes:
    get:
      operationId: listShapes
      tags: [shapes]
      summary: List all shapes on a map
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: mapId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Array of shapes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShapeResponse"
        "404":
          description: Map not found in workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createShape
      tags: [shapes]
      summary: Create a shape on a map
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: mapId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShapeRequest"
      responses:
        "201":
          description: Shape created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShapeResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Map not found in workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{workspaceId}/maps/{mapId}/shapes/{shapeId}:
    put:
      operationId: updateShape
      tags: [shapes]
      summary: Update a shape
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: mapId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: shapeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShapeRequest"
      responses:
        "200":
          description: Updated shape
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShapeResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Shape or map not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteShape
      tags: [shapes]
      summary: Delete a shape
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: mapId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: shapeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Map not found in workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{workspaceId}/maps/{mapId}/text-elements:
    post:
      operationId: createTextElement
      tags: [text-elements]
      summary: Create a text element on a map
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: mapId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTextElementRequest"
      responses:
        "201":
          description: Text element created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextElementResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Map not found in workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /workspaces/{workspaceId}/maps/{mapId}/text-elements/{elementId}:
    put:
      operationId: updateTextElement
      tags: [text-elements]
      summary: Update a text element
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: mapId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: elementId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTextElementRequest"
      responses:
        "200":
          description: Updated text element
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextElementResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Text element or map not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTextElement
      tags: [text-elements]
      summary: Delete a text element
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: mapId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: elementId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Map not found in workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    TaskStatus:
      type: string
      enum: [pending, in_progress, completed, overdue, blocked, draft]

    TaskPriority:
      type: string
      enum: [low, medium, high, critical]

    ScheduleMode:
      type: string
      enum: [ate, entre, em, sem_prazo, urgente]
      description: |
        Modalidade de prazo de uma tarefa.
        - `ate`: só dueDate (fazer até).
        - `entre`: janela [startAt, dueDate] (fazer entre).
        - `em`: dia pontual (startAt === dueDate).
        - `sem_prazo`: sem datas.
        - `urgente`: sem datas, mas pinada no topo de toda lista (primeiro critério de ordenação).

    CardVisualStatus:
      type: string
      enum: [no_task, pending, in_progress, completed, overdue, blocked, draft]

    WorkspaceRole:
      type: string
      enum: [admin, editor, executor]

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required: [name, email, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    UserPronouns:
      type: string
      enum: [name_only, ela_dela, ele_dele, elu_delu]

    UserClass:
      type: string
      description: |
        Identifier of a user role/class. The list is extensible — clients
        should display unknown identifiers verbatim instead of erroring.
      enum:
        - gerente_contas
        - gestor_trafego
        - gestor_midias_sociais
        - analista_dados
        - designer
        - tecnico

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
        avatarUrl:
          type: string
          nullable: true
        whatsapp:
          type: string
          nullable: true
        classes:
          type: array
          items:
            $ref: "#/components/schemas/UserClass"
        pronouns:
          $ref: "#/components/schemas/UserPronouns"
      required: [id, name, email, createdAt, classes, pronouns]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
      required: [user]

    CreateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
      required: [name]

    WorkspaceTaskCounts:
      type: object
      properties:
        overdue:
          type: integer
        blocked:
          type: integer
        in_progress:
          type: integer
        pending:
          type: integer
        total:
          type: integer
        completed:
          type: integer
      required: [overdue, blocked, in_progress, pending, total, completed]

    WorkspaceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        taskCounts:
          $ref: "#/components/schemas/WorkspaceTaskCounts"
      required: [id, name, createdBy, createdAt, role, taskCounts]

    WorkspaceDetailResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        members:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceMemberResponse"
        maps:
          type: array
          items:
            $ref: "#/components/schemas/MapResponse"
      required: [id, name, createdBy, createdAt, role, members, maps]

    WorkspaceMemberResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        user:
          $ref: "#/components/schemas/UserResponse"
        createdAt:
          type: string
          format: date-time
      required: [id, workspaceId, userId, role, user, createdAt]

    AddMemberRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/WorkspaceRole"
      required: [email, role]

    UpdateMemberRoleRequest:
      type: object
      properties:
        role:
          $ref: "#/components/schemas/WorkspaceRole"
      required: [role]

    CreateMapRequest:
      type: object
      properties:
        name:
          type: string
      required: [name]

    MapResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, workspaceId, name, createdBy, createdAt, updatedAt]

    MapDetailResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        cards:
          type: array
          items:
            $ref: "#/components/schemas/CardResponse"
        connections:
          type: array
          items:
            $ref: "#/components/schemas/ConnectionResponse"
        textElements:
          type: array
          items:
            $ref: "#/components/schemas/TextElementResponse"
        shapes:
          type: array
          items:
            $ref: "#/components/schemas/ShapeResponse"
      required: [id, workspaceId, name, createdBy, createdAt, updatedAt, cards, connections, textElements, shapes]

    CreateCardRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        positionX:
          type: number
        positionY:
          type: number
      required: [title]

    UpdateCardRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        positionX:
          type: number
        positionY:
          type: number

    CardResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mapId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        positionX:
          type: number
        positionY:
          type: number
        statusVisual:
          $ref: "#/components/schemas/CardVisualStatus"
        taskId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        taskDueDate:
          type: string
          format: date-time
          nullable: true
        taskStartAt:
          type: string
          format: date-time
          nullable: true
        taskScheduleMode:
          $ref: '#/components/schemas/ScheduleMode'
          nullable: true
        taskAssigneeName:
          type: string
          nullable: true
        taskAssigneeId:
          type: string
          format: uuid
          nullable: true
        taskOverdue:
          type: boolean
        taskAssigneeAvatarUrl:
          type: string
          nullable: true
        taskCompletedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, mapId, title, positionX, positionY, statusVisual, createdAt, updatedAt]

    LayoutMapResponse:
      type: object
      required: [cards]
      properties:
        cards:
          type: array
          description: Only the cards whose position actually changed.
          items:
            type: object
            required: [id, positionX, positionY]
            properties:
              id:
                type: string
                format: uuid
              positionX:
                type: number
              positionY:
                type: number

    CardDetailResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mapId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        positionX:
          type: number
        positionY:
          type: number
        statusVisual:
          $ref: "#/components/schemas/CardVisualStatus"
        taskId:
          type: string
          format: uuid
          nullable: true
        task:
          $ref: "#/components/schemas/TaskResponse"
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, mapId, title, positionX, positionY, statusVisual, createdAt, updatedAt]

    CreateConnectionRequest:
      type: object
      properties:
        sourceCardId:
          type: string
          format: uuid
        targetCardId:
          type: string
          format: uuid
      required: [sourceCardId, targetCardId]

    ConnectionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mapId:
          type: string
          format: uuid
        sourceCardId:
          type: string
          format: uuid
        targetCardId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
      required: [id, mapId, sourceCardId, targetCardId, createdAt]

    CreateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        assignedTo:
          type: string
          format: uuid
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        startAt:
          type: string
          format: date-time
          nullable: true
        scheduleMode:
          $ref: "#/components/schemas/ScheduleMode"
        priority:
          $ref: "#/components/schemas/TaskPriority"
      required: [title]

    UpdateTaskStatusRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/TaskStatus"
      required: [status]

    UpdateTaskDetailsRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        assignedTo:
          type: string
          format: uuid
          nullable: true
        ownerId:
          type: string
          format: uuid
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        startAt:
          type: string
          format: date-time
          nullable: true
        scheduleMode:
          $ref: "#/components/schemas/ScheduleMode"
        priority:
          $ref: "#/components/schemas/TaskPriority"

    TaskResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mapId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        assignedTo:
          type: string
          format: uuid
          nullable: true
        assignedUser:
          $ref: "#/components/schemas/UserResponse"
          nullable: true
        ownerId:
          type: string
          format: uuid
          nullable: true
        ownerName:
          type: string
          nullable: true
        ownerAvatarUrl:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        startAt:
          type: string
          format: date-time
          nullable: true
        scheduleMode:
          $ref: "#/components/schemas/ScheduleMode"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        status:
          $ref: "#/components/schemas/TaskStatus"
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, mapId, workspaceId, title, priority, status, createdAt, updatedAt]

    TaskWithContextResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mapId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        assignedTo:
          type: string
          format: uuid
          nullable: true
        ownerId:
          type: string
          format: uuid
          nullable: true
        ownerName:
          type: string
          nullable: true
        ownerAvatarUrl:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        startAt:
          type: string
          format: date-time
          nullable: true
        scheduleMode:
          $ref: "#/components/schemas/ScheduleMode"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        status:
          $ref: "#/components/schemas/TaskStatus"
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        cardId:
          type: string
          format: uuid
        cardTitle:
          type: string
        mapName:
          type: string
        workspaceName:
          type: string
      required: [id, mapId, workspaceId, title, priority, status, createdAt, updatedAt, cardId, cardTitle, mapName, workspaceName]

    DashboardResponse:
      type: object
      properties:
        workspaceId:
          type: string
          format: uuid
        totalMaps:
          type: integer
        totalCards:
          type: integer
        totalTasks:
          type: integer
        tasksByStatus:
          type: object
          properties:
            pending:
              type: integer
            in_progress:
              type: integer
            completed:
              type: integer
            overdue:
              type: integer
          required: [pending, in_progress, completed, overdue]
        tasksByPriority:
          type: object
          properties:
            low:
              type: integer
            medium:
              type: integer
            high:
              type: integer
            critical:
              type: integer
          required: [low, medium, high, critical]
      required: [workspaceId, totalMaps, totalCards, totalTasks, tasksByStatus, tasksByPriority]

    AttachmentKind:
      type: string
      enum: [standard, deliverable]
      description: |
        Categorizes attachments. `standard` is the default for general files;
        `deliverable` marks artifacts that approval tasks expose (read-only)
        as the deliverables of their parent task.

    AttachmentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fileUploadId:
          type: string
          format: uuid
        objectPath:
          type: string
        fileName:
          type: string
        fileSize:
          type: integer
        mimeType:
          type: string
        uploadedBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        kind:
          $ref: "#/components/schemas/AttachmentKind"
        inheritedFromTaskId:
          type: string
          format: uuid
          nullable: true
          description: |
            Non-null when this attachment surfaces on the task via inheritance
            from an upstream task connected on the canvas (card_connections).
            UI may render a "Herdado de X" badge. Null for native uploads.
        state:
          type: string
          enum: [available, pending]
          description: |
            `available` — clickable/downloadable. `pending` — visible only as a
            preview because the upstream source task is not `completed` yet.
            Native uploads are always `available`.
      required: [id, fileUploadId, objectPath, fileName, fileSize, mimeType, createdAt, kind, state]

    PromoteOrDemoteResponse:
      type: object
      description: |
        Result of changing an attachment's per-link kind. When promoting to
        `deliverable`, `propagatedToCount` is the number of downstream tasks
        that newly received the attachment. When demoting to `standard`,
        `removedFromCount` is the number of downstream rows cleaned by the
        cascade.
      properties:
        kind:
          $ref: "#/components/schemas/AttachmentKind"
        propagatedToCount:
          type: integer
        removedFromCount:
          type: integer
      required: [kind]

    UnlinkAttachmentResponse:
      type: object
      properties:
        downstreamRemovedCount:
          type: integer
      required: [downstreamRemovedCount]

    AttachmentUsageResponse:
      type: object
      description: How many tasks an attachment is currently linked to (used by the delete-confirm modal).
      properties:
        taskCount:
          type: integer
        taskIds:
          type: array
          items:
            type: string
            format: uuid
      required: [taskCount, taskIds]

    CreateAttachmentRequest:
      type: object
      properties:
        objectPath:
          type: string
        fileName:
          type: string
        fileSize:
          type: integer
        mimeType:
          type: string
        kind:
          $ref: "#/components/schemas/AttachmentKind"
      required: [objectPath, fileName, fileSize, mimeType]

    UpdateAttachmentKindRequest:
      type: object
      properties:
        kind:
          $ref: "#/components/schemas/AttachmentKind"
      required: [kind]

    ConsolidatedActivitySource:
      type: object
      properties:
        taskId:
          type: string
          format: uuid
        taskTitle:
          type: string
        isApprovalTask:
          type: boolean
        approverName:
          type: string
          nullable: true
      required: [taskId, taskTitle, isApprovalTask]

    ConsolidatedActivityActivityRow:
      type: object
      description: |
        Activity-style row in the consolidated approval timeline (status changes,
        assignments, etc). Discriminated by `kind: "activity"`.
      properties:
        kind:
          type: string
          enum: [activity]
        id:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        actorId:
          type: string
          format: uuid
          nullable: true
        actorName:
          type: string
          nullable: true
        actorAvatarUrl:
          type: string
          nullable: true
        type:
          type: string
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        source:
          $ref: "#/components/schemas/ConsolidatedActivitySource"
          nullable: true
      required: [kind, id, taskId, type, metadata, createdAt]

    ConsolidatedActivityCommentRow:
      type: object
      description: |
        Comment-style row in the consolidated approval timeline (free-text
        notes posted by the executor or other approvers). Discriminated by
        `kind: "comment"`.
      properties:
        kind:
          type: string
          enum: [comment]
        id:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
          nullable: true
        authorName:
          type: string
          nullable: true
        authorAvatarUrl:
          type: string
          nullable: true
        content:
          type: string
        hidden:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        source:
          $ref: "#/components/schemas/ConsolidatedActivitySource"
          nullable: true
      required: [kind, id, taskId, content, hidden, createdAt, updatedAt]

    ConsolidatedActivityResponse:
      description: |
        A single row in the consolidated activity history of an approval
        task. Discriminated by the `kind` field — `"activity"` for system
        activities or `"comment"` for free-text comments. Both variants
        include an optional `source` describing whether the row originated
        on the parent task or a sibling approval task.
      oneOf:
        - $ref: "#/components/schemas/ConsolidatedActivityActivityRow"
        - $ref: "#/components/schemas/ConsolidatedActivityCommentRow"
      discriminator:
        propertyName: kind
        mapping:
          activity: "#/components/schemas/ConsolidatedActivityActivityRow"
          comment: "#/components/schemas/ConsolidatedActivityCommentRow"

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. image/jpeg).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. /objects/uploads/uuid). Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

