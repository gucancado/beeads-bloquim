<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Inline (non-module, synchronous) handlers registered before any deferred
         module script or Replit-injected script can run.  Suppresses unhandled
         Promise rejections so Replit's cross-frame monitoring does not report them
         as phantom crashes.  Proper errors still surface via the ErrorBoundary. -->
    <script>
      (function () {
        function suppress(e) {
          try { e.preventDefault(); } catch (_) {}
          try { e.stopImmediatePropagation(); } catch (_) {}
          return true;
        }
        window.addEventListener('unhandledrejection', suppress, true);
        window.addEventListener('error', suppress, true);
        window.onerror = function () { return true; };
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Bloquim</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
