<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Inline (non-module, synchronous) handlers registered before any deferred
         module script or Replit-injected script can run.  Suppresses unhandled
         Promise rejections so Replit's cross-frame monitoring does not report them
         as phantom crashes.  Proper errors still surface via the ErrorBoundary. -->
    <script>
      (function () {
        // Wrap ResizeObserver so all callbacks run inside requestAnimationFrame.
        // This prevents Chrome's "ResizeObserver loop completed with undelivered
        // notifications." global error that fires whenever ReactFlow's internal
        // ResizeObserver callbacks cannot be fully delivered within one paint
        // frame. The error has error=null (not an Error instance) which causes
        // Replit's cross-frame CDP monitor to report a spurious runtime crash on
        // every node drag. Deferring via rAF eliminates the loop condition.
        if (typeof window.ResizeObserver !== 'undefined') {
          var _RO = window.ResizeObserver;
          window.ResizeObserver = function ResizeObserver(cb) {
            return new _RO(function(entries, observer) {
              requestAnimationFrame(function() { cb(entries, observer); });
            });
          };
          window.ResizeObserver.prototype = _RO.prototype;
        }

        // Suppress any remaining unhandled errors/rejections so they don't
        // trigger Replit's phantom crash indicator.
        function suppress(e) {
          try { e.preventDefault(); } catch (_) {}
          return true;
        }
        window.addEventListener('unhandledrejection', suppress, true);
        window.addEventListener('error', suppress, true);
        window.onerror = function () { return true; };
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="google-site-verification" content="hFyQDrClBLLfSHKpYNqCQH8JdalzxOfDOb1H-FgXpcQ" />
    <title>Bloquim</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
