<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="36" fill="#FF3C00"/>
  <!-- Notebook body -->
  <rect x="42" y="38" width="78" height="96" rx="6" fill="white" opacity="0.95"/>
  <!-- Spiral binding -->
  <rect x="34" y="38" width="16" height="96" rx="4" fill="white" opacity="0.5"/>
  <circle cx="42" cy="58" r="5" fill="#FF3C00"/>
  <circle cx="42" cy="78" r="5" fill="#FF3C00"/>
  <circle cx="42" cy="98" r="5" fill="#FF3C00"/>
  <circle cx="42" cy="118" r="5" fill="#FF3C00"/>
  <!-- Lines on notebook -->
  <rect x="58" y="62" width="48" height="5" rx="2.5" fill="#FF3C00" opacity="0.25"/>
  <rect x="58" y="76" width="40" height="5" rx="2.5" fill="#FF3C00" opacity="0.25"/>
  <rect x="58" y="90" width="44" height="5" rx="2.5" fill="#FF3C00" opacity="0.25"/>
  <!-- Pencil -->
  <g transform="rotate(-40, 118, 118)">
    <rect x="108" y="90" width="14" height="52" rx="2" fill="white"/>
    <polygon points="108,142 122,142 115,158" fill="white" opacity="0.8"/>
    <rect x="108" y="90" width="14" height="10" rx="2" fill="white" opacity="0.5"/>
    <line x1="115" y1="148" x2="115" y2="158" stroke="#FF3C00" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
